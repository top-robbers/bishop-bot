name: Deploy Bot

on:
  workflow_dispatch:
    inputs:
      deploy_commands:
        description: 'Deploy Discord slash commands'
        required: true
        type: boolean
        default: true

concurrency:
  group: top-robbers-bot-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Bot to VPS
    runs-on: ubuntu-latest

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_SSH_PORT || 22 }}
      DEPLOY_PATH: /opt/top-robbers/bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/top_robbers_deploy_key
          chmod 600 ~/.ssh/top_robbers_deploy_key

          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/top_robbers_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "mkdir -p $DEPLOY_PATH"

      - name: Sync files to VPS
        run: |
          set -euo pipefail

          rsync -az --delete \
            -e "ssh -i ~/.ssh/top_robbers_deploy_key -p $VPS_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "dist/" \
            --exclude ".env" \
            --exclude ".env.*" \
            ./ "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/"

      - name: Deploy Docker service
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/top_robbers_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" << EOF
            set -euo pipefail

            cd "$DEPLOY_PATH"

            if [ ! -f ".env" ]; then
              echo "Missing $DEPLOY_PATH/.env"
              exit 1
            fi

            echo "Building and starting Discord bot..."
            docker compose -f docker-compose.yml up -d --build --force-recreate --remove-orphans discord-bot

            echo "Waiting for container to start..."
            sleep 5

            if [ "${{ inputs.deploy_commands }}" = "true" ]; then
              echo "Deploying Discord slash commands..."
              docker compose -f docker-compose.yml exec -T discord-bot npm run commands:deploy:prod
            fi

            echo "Docker status:"
            docker compose -f docker-compose.yml ps

            echo "Recent logs:"
            docker compose -f docker-compose.yml logs --tail=80 discord-bot

            docker image prune -f
          EOF